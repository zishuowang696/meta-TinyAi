# TinyAI 发行版配置
# 继承自 poky，默认包含 llama-cpp（LLM 推理引擎）

require conf/distro/poky.conf

# Override DISTRO back to "tinyai" — poky.conf uses hard assignment (=) that
# would otherwise override whatever kas set in local.conf
DISTRO = "tinyai"

DISTRO_NAME = "TinyAI"
DISTRO_VERSION = "1.0.0"
DISTRO_CODENAME = "tinyai"

# 使用 OpenRC（覆盖上游 defaultsetup.conf 中的 "systemd" 以及 poky.conf 的 ?=）
INIT_MANAGER = "openrc"

# init-manager-*.inc 已在 defaultsetup.conf 中提前加载（只用了 ??=），
# 这里用硬 = 覆盖，确保 OpenRC 的 VIRTUAL-RUNTIME 生效。
DISTRO_FEATURES:append = " openrc"
DISTRO_FEATURES_OPTED_OUT:append = " sysvinit systemd"
VIRTUAL-RUNTIME_init_manager = "openrc-init"
VIRTUAL-RUNTIME_initscripts = "openrc"
VIRTUAL-RUNTIME_login_manager = "busybox"
VIRTUAL-RUNTIME_keymaps = "openrc"
VIRTUAL-RUNTIME_base-utils-hwclock = "openrc"

# 使用 musl libc（减少体积，适合嵌入式）
TCLIBC = "musl"

# 使用 mdev（busybox 内置）作为设备管理器——轻量、无守护进程、无需 udev
# 与 Alpine Linux 策略一致。显式设定以覆盖任何上游默认值。
VIRTUAL-RUNTIME_dev_manager = "busybox-mdev"

# 启用 WiFi 支持（使依赖 DISTRO_FEATURES 的 recipe 能按需开启 wifi 功能）
DISTRO_FEATURES:append = " wifi"

