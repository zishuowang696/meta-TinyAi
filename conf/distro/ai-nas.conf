# AI-NAS 发行版配置
# 继承自 poky，使用 systemd + glibc，面向 NAS + AI 推理场景

require conf/distro/poky.conf

# Override DISTRO — poky.conf 使用硬赋值 (=) 会覆盖 kas/local.conf 的设置
DISTRO = "ai-nas"

DISTRO_NAME = "AI-NAS"
DISTRO_VERSION = "1.0.0"
DISTRO_CODENAME = "ai-nas"

# ── 核心组件 ─────────────────────────────────────────────────

# 使用 systemd（覆盖 poky.conf 的 ?= sysvinit）
# defaultsetup.conf 已通过 ??= "systemd" 加载了 init-manager-systemd.inc，
# 这里用硬赋值确保最终值与加载的 inc 一致
INIT_MANAGER = "systemd"

# 使用 glibc（默认值，显式声明以明确与 tinyai 的 musl 区分）
TCLIBC = "glibc"

# ── NAS 相关特性 ─────────────────────────────────────────────

# 文件系统支持：btrfs（快照/RAID）、xfs（大容量存储）
DISTRO_FEATURES:append = " btrfs xfs"

# 网络存储协议
# nfs — NFS 客户端/服务端支持（通过 DISTRO_FEATURES 触发对应 recipe 开关）
# 注意：samba 和 nfs 通常通过 IMAGE_INSTALL 添加 recipe 而非 DISTRO_FEATURES
DISTRO_FEATURES:append = " wifi"

# ── AI 相关特性 ──────────────────────────────────────────────

# 保留 AI 推理支持（通过 recipes-support 中的 llama.cpp 等提供）
# AI 推理引擎通过 IMAGE_INSTALL 添加，不在 DISTRO_FEATURES 层面控制

# ── 系统组件 ─────────────────────────────────────────────────

# 使用 systemd 的 udev 作为设备管理器（由 init-manager-systemd.inc 设置）
VIRTUAL-RUNTIME_dev_manager = "systemd"

# 使用 systemd-networkd 管理网络（轻量，无需额外依赖）
# 可在 IMAGE_INSTALL 中添加 systemd-networkd 或 NetworkManager

# 登录管理器使用 shadow（提供完善的用户/权限管理，适合 NAS 多用户场景）
# （由 init-manager-systemd.inc 设置为 shadow-base）
VIRTUAL-RUNTIME_login_manager = "shadow-base"
